{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Business Rules Engine</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Messages -->
    {% if messages %}
    <div class="messages-container" style="max-width: 500px;">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
            <span class="alert-close" onclick="this.parentElement.remove()">×</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>⚙️ BRE</h1>
                <p>Dynamic Business Rules Engine</p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.7rem; font-size: 1rem;">Login</button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
